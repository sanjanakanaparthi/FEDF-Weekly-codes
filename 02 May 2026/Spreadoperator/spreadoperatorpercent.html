<html>
<head>
  <title>ES6 Features</title>
</head>
<body>
<h2>ES6+ Essentials Spread Operator</h2>
<button onclick="showData()">
  Run Program
</button>
<h1 id="output"></h1>
<script>
const student = {
  name: "Srinivas",
  regno: 2520030001
};
const INSEM1 = [80, 90, 95, 96];
const INSEM2 = [95, 100, 96, 98];
function showData() {
  // Destructuring
  let { name, regno } = student;
  // Spread Operator
  const TotalMarks = [...INSEM1, ...INSEM2];
  // Arrow Function for Average
  const calculateAverage = (...marks) => {
    let total = marks.reduce(
      (sum, mark) => sum + mark,
      0
    );
    return total / marks.length;
  };
  // Average Result
  const result = calculateAverage(...TotalMarks);
  // Display Output
  document.getElementById("output").innerHTML =
    `    Name: ${name} <br>
    Reg No: ${regno} <br><br>
    INSEM1 Marks: ${INSEM1} <br>
    INSEM2 Marks: ${INSEM2} <br><br>
    Total Marks: ${TotalMarks} <br><br>
    Average Percentage: ${result.toFixed(2)}%
    `;
}

</script>

</body>
</html>
