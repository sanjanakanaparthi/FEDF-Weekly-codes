<!DOCTYPE html>
<html>
<head>
  <title>Closure Counter</title>
</head>
<body>
<h2>Visitor Counter using Closure</h2>
<button onclick="countVisitor()">Visit</button>
<h3 id="output">0</h3>
<script>
function createCounter() {
  let visitors = 0;
  return function () {
    visitors++;
    return visitors;
  };
}
const counter = createCounter();
function countVisitor() {
  document.getElementById("output").innerHTML = counter();
}
</script>
</body>
</html>
