<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Variables</title>
</head>
<body>
<h2>JavaScript Variables Demo</h2>
<button onclick="showData()">
  Show Values</button>
<p id="output"></p>
<script>
function showData() {
 // let variable
  let cluster = 2;
//REDECLARE NOT ALLOWED
  //let cluster = 1;
  // var variable
  var section = "S6";
//REDECLARE ALLOWED
   var section = "S5";
  // const variable
  const regno = 2520030001;
  // Template Literal
  let message = `
    Registration Number: ${regno} <br>
    Cluster: ${cluster} <br>
    Section: ${section} <br>
      `;
  document.getElementById("output").innerHTML = message;
}
</script>
</body>
</html>
